# Per-app deploy pipeline(Phase 5 deliverable,2026-05-23 updated:Vercel → Netlify per user 「應該部署到netlify並要有權限控管」)
#
# Host:**Netlify**(per user security posture:private repo + 權限控管)
# Strategy:matrix on apps/* — 每 app 平行 build + per-site Netlify deploy
#
# **權限控管 setup**(在 Netlify dashboard 一次性設定每個 site,not in this yaml):
#   Option 1 — Site Password Protection(Pro 方案,$19/mo per site)
#     Site settings → Access control → Visitor access → Password protection
#   Option 2 — Netlify Identity(Free,JWT-based access gate)
#     Site settings → Identity → Enable Identity → 加 team member emails
#   Option 3 — Role-based access control(RBAC)(Enterprise)
#     Site settings → Access control → Role-based access
#
# **Production Recommendation**:Identity(免費)+ invite-only registration,team members log in 才能看 deploy preview。
name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.list.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          # List apps/* dirs as JSON array for matrix(exclude _template)
          APPS=$(ls -d apps/*/ 2>/dev/null | grep -v '_template' | sed 's|apps/||;s|/||' | jq -R . | jq -sc .)
          echo "apps=$APPS" >> $GITHUB_OUTPUT

  deploy:
    needs: detect
    runs-on: ubuntu-latest
    if: needs.detect.outputs.apps != '[]'
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build ${{ matrix.app }}
        run: npm -w @your-org/${{ matrix.app }} run build

      # Netlify deploy(per-app site,設定一次)
      # Pre-requisite secrets(per app)in GitHub repo Settings → Secrets:
      #   NETLIFY_AUTH_TOKEN          — global personal access token
      #   NETLIFY_SITE_ID_<APP_NAME>  — per-app site ID(eg. NETLIFY_SITE_ID_ORDER_DASHBOARD)
      # Resolve dynamic per-app secret(2026-05-23 fix:GitHub Actions secrets context 不支 dynamic name lookup)
      # 用 oNaiPs/secrets-to-env-action 讀全 secrets 到 env,然後 shell 解 NETLIFY_SITE_ID_<APP>
      - name: Export all secrets to env
        uses: oNaiPs/secrets-to-env-action@v1
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Deploy to Netlify
        env:
          APP_NAME: ${{ matrix.app }}
        run: |
          if [ -z "$NETLIFY_AUTH_TOKEN" ]; then
            echo "NETLIFY_AUTH_TOKEN not set,skip deploy"
            exit 0
          fi

          # 動態 resolve app site ID secret(eg. order-dashboard → NETLIFY_SITE_ID_ORDER_DASHBOARD)
          SITE_ID_VAR="NETLIFY_SITE_ID_$(echo $APP_NAME | tr 'a-z-' 'A-Z_')"
          SITE_ID="${!SITE_ID_VAR}"

          if [ -z "$SITE_ID" ]; then
            echo "$SITE_ID_VAR not set in secrets,skip deploy ${APP_NAME}"
            exit 0
          fi

          PROD_FLAG=""
          if [ "${{ github.event_name }}" = "push" ]; then PROD_FLAG="--prod"; fi

          npx netlify-cli deploy \
            --dir apps/${APP_NAME}/dist \
            --site $SITE_ID \
            --auth $NETLIFY_AUTH_TOKEN \
            --message "Deploy from $GITHUB_SHA" \
            $PROD_FLAG
