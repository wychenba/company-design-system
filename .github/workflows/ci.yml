name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 允許手動 trigger,讓 working branch 也能在 merge 前跑 verify + scrollbar probe
  workflow_dispatch:

# GitHub Pages 部署所需 permission(只 main push 才用,PR 不影響)
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只允許 1 個 Pages deploy(避免 race)
concurrency:
  group: pages
  cancel-in-progress: false

# 2026-06-04 SSOT 假綠根治:所有 run: step 一律 bash -eo pipefail。
# GitHub Actions 預設 bash -e 但「無 pipefail」→ `cmd 2>&1 | tail` 的 pipe exit = tail = 0,
# cmd 失敗被吞 = 假綠(原只有 Storybook build 一步手動 set -o pipefail,其餘 ~17 步全漏)。
# workflow-level default 一次涵蓋所有 step,取代逐步 set -o pipefail(SSOT)。
defaults:
  run:
    shell: bash -eo pipefail {0}

jobs:
  verify:
    name: Verify(tsc + tests + compile + build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 2026-06-08 fix(Pages 永遠不更新根治):輸出「Pages artifact 是否已成功 build+upload」。讓 deploy job
    # 只依賴「build 成功」而非「整個 Verify 綠」—— 否則一個「非關鍵 doc-check(死連結 / spec-deadlink 等)」
    # 失敗就永久擋住整個 storybook 部署(發生 N 次的根因:doc-check drift → Verify fail → deploy skip)。
    outputs:
      pages_ready: ${{ steps.pages_mark.outputs.ready }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Match local dev container (node 22). Node 20 had compile-stories
          # exit 1 mismatch vs local pass — likely vm.runInNewContext / yaml
          # lib parse difference. Pin to 22 to align.
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build DS lib + storybook-config dist(required for tsc + Storybook)
        # 2026-05-26 fix(per user 「DS repo netlify failed 那麼多次」+ CI fail diagnose):
        # `.storybook/main.ts` imports `@qijenchen/storybook-config/preset` types → 需 storybook-config dist 才能 resolve。
        # storybook-config 本身又 imports `@qijenchen/design-system` types → 需 DS dist。
        # `build:lib` chain DS build → DS dts → storybook-config build,正確 dependency order。
        run: npm run build:lib

      # 2026-05-29 RC1 fix(codex dual-track 共識):ds-devmode addon manager 程式必用 classic JSX
      # (React.createElement,用 Storybook manager externalize 的 React),禁 react/jsx-runtime
      # (consumer 非 monorepo 環境會解析到第二份 React → Minified React error #31 → 故事檢視空白)。
      # 守 `/** @jsxRuntime classic */` pragma 不被移除。Anchor:beta.33 fork storybook 故事檢視空白。
      - name: Guard ds-devmode manager classic JSX(no jsx-runtime)
        run: |
          if grep -rEl "from [\"']react/jsx-runtime[\"']" packages/storybook-config/dist/addons/ds-devmode/manager.js packages/storybook-config/dist/addons/ds-devmode/Panel.js 2>/dev/null; then
            echo "❌ ds-devmode manager dist 含 react/jsx-runtime import → consumer manager React #31 風險。"
            echo "   manager.tsx / Panel.tsx 必保留 '/** @jsxRuntime classic */' pragma。"
            exit 1
          fi
          echo "✅ ds-devmode manager 用 classic JSX(無 jsx-runtime)"

      # 2026-05-29:機械保證 consumer CSS 入口完整(tailwind + tokens+base + DS @source)。
      # 防 globals.css「掉東掉西」drift class(字體 / 沒吃到元件 / 底色 退預設)。
      - name: Guard consumer CSS entry completeness
        run: npm run verify:consumer-css

      - name: tsc -b(0 errors required + 印 errors 出來)
        # 2026-05-26 fix:`2>&1 | grep -q` 把 errors silent 掉,無法 diagnose CI 真實 fail。改 print 完整 errors。
        run: |
          OUTPUT=$(npx tsc -b 2>&1)
          if echo "$OUTPUT" | grep -q "error TS"; then
            echo "❌ tsc errors found:"
            echo "$OUTPUT"
            exit 1
          fi

      - name: typecheck stories(主 tsc -b exclude stories 因 emitDeclarationOnly;本 gate 純型別檢查 stories 防 {var}-undefined / prop 型別錯 — 2026-06-02 SizeMatrix crash root cause)
        run: |
          OUTPUT=$(npm run typecheck:stories 2>&1)
          if echo "$OUTPUT" | grep -q "error TS"; then
            echo "❌ story type errors found:"
            echo "$OUTPUT"
            exit 1
          fi
          echo "✅ stories type-check clean"

      - name: Hook test suite
        run: |
          shopt -s nullglob
          fail=0
          for t in .claude/hooks/tests/test_*.sh; do
            chmod +x "$t"
            if ! bash "$t" > /tmp/test.log 2>&1; then
              echo "❌ $t failed:"
              tail -10 /tmp/test.log
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "✅ all hook tests passed"

      - name: Story compile-drift check
        run: |
          # 直接用 compile-stories.mjs 的 exit code:script 內部 `--check` mode 已正確
          # 區分 drift(exit 1)vs aligned-only(exit 0)。skipped count 不算 drift。
          # 印完整 output 方便 CI log 查問題,exit code 作為唯一 source of truth。
          set +e
          node scripts/compile-stories.mjs --all --check
          ec=$?
          if [ "$ec" -ne 0 ]; then
            echo "❌ compile-stories exited with code $ec — drift detected"
            exit "$ec"
          fi
          echo "✅ compile-stories: no drift"

      - name: Storybook build
        # 2026-05-31 fix(假綠 anchor):原 `| tail -20` 讓 pipe exit code = tail(永遠 0)→
        # build-storybook 失敗(如 CSF index error / 未閉合 JSX tag)被吞 → CI 假綠,只有 release.yml
        # FULL smoke 才抓到。set -o pipefail 讓 build 真實 exit code 傳出 → build 失敗 = CI 紅。
        run: |
          set -o pipefail
          npm run build-storybook 2>&1 | tail -30

      - name: Storybook story runtime smoke test(Phase 4.13 — 0 console error gate)
        # 2026-05-25 Phase 4.13 加 — 本 session 已踩 3 個 story runtime bug(Breadcrumb asChild
        # / DataTable JSX comment / Internal pattern visual)。`build-storybook` 過 = compile pass
        # ≠ runtime render pass。本 step Playwright 訪問每個 story id + assert 0 console error,
        # catch React.Children.only / undefined import / 等 runtime trap。
        # Fail = block main merge / 防 runtime regression ship。
        run: node scripts/storybook-smoke-test.mjs

      - name: Windows-like scrollbar probe(Linux Chromium ≈ Windows persistent bar)
        # 地端 macOS 是 OS-overlay scrollbar，看不到 Windows 17px persistent bar 的圓角溢出。
        # CI Linux Chromium 預設 persistent native scrollbar，視覺接近 Win Chrome → 用來驗證
        # data-table.css v15.13 interim CSS parity 是否有效。
        # 跑完 upload artifact 給 user 看 corner-zoom 圖。
        run: |
          set -e
          # 1) 起 static http server serving storybook-static/
          python3 -m http.server 8000 --directory storybook-static > /tmp/sb-static.log 2>&1 &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:8000/ > /dev/null && echo "✓ storybook-static served" || (echo "✗ static server failed"; cat /tmp/sb-static.log; exit 1)
          # 2) 跑 probe
          STORYBOOK_URL=http://localhost:8000 node scripts/probe-windows-scrollbar.mjs 2>&1 | tail -40
          # 3) 收 server
          kill $SERVER_PID 2>/dev/null || true
          ls -la tmp/scrollbar-probe/ 2>&1 | tail -20

      - name: Upload scrollbar probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrollbar-probe-linux
          path: tmp/scrollbar-probe/
          if-no-files-found: warn

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      # 2026-06-08:標記「Pages artifact 已成功 build+upload」→ deploy job 據此判斷可部署(decouple from doc-checks)。
      - name: Mark Pages artifact ready
        id: pages_mark
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Vite build
        run: npm run build 2>&1 | tail -10

      - name: Story quality DS-wide(Dim 40/41/42 anti-sample deterministic scan)
        run: npm run story-quality:check 2>&1 | tail -20

      - name: DataTable row-mode SSOT(data-table.spec.md:457「強制」— 2026-05-30 wired from orphan per codex Phase B)
        run: npm run audit:datatable-row-mode 2>&1 | tail -20

      - name: Anti-sample coverage matrix(88-dim fail-closed gate — 2026-05-30 codex Phase B P1 補滿 56→88 + --check)
        run: npm run audit:coverage-matrix -- --check 2>&1 | tail -20

      - name: Governance counter SSOT(count drift fail-closed — 2026-05-30 全掃 curated docs,治「改 dim 數忘了改 plugin.json」)
        run: node scripts/sync-governance-counters.mjs --check 2>&1 | tail -20

      - name: Story LinkTo target SSOT(principles LinkTo name 必命中 showcase story name — 2026-05-30 治系統性死連結)
        run: node scripts/check-story-linkto-targets.mjs --check 2>&1 | tail -40

      - name: Layout Family frontmatter(Dim 16 deterministic backstop — 2026-05-30 從誤分 PURE-JUDGMENT 修正)
        run: node scripts/audit-layout-family-frontmatter.mjs --check 2>&1 | tail -20

      - name: SSOT spec dead-link(Dim 2 deterministic backstop — 2026-05-30 從誤分 PURE-JUDGMENT 修正,治 rename spec 忘改 pointer)
        run: node scripts/audit-spec-deadlinks.mjs --check 2>&1 | tail -30

      - name: SSOT reciprocal-pointer(Dim 3 — 2026-05-31 加 --check gate,原 mutator 無 verify=紙上 DETERMINISTIC)
        run: node scripts/add-reciprocal-pointers.mjs --check 2>&1 | tail -20

      - name: Content quality DS-wide(spec/story 人話 + 佔位符 deterministic gate — 2026-05-30 wire per task#6 orphan)
        run: node scripts/audit-content-quality.mjs --check 2>&1 | tail -20

      - name: .mjs syntax gate(M6 — 抓 TS-in-mjs dead script 假綠,2026-05-30 per laziness-hunt)
        run: |
          for f in scripts/*.mjs; do node --check "$f" || { echo "❌ $f node --check failed (TS-in-mjs?)"; exit 1; }; done
          echo "✅ all scripts/*.mjs parse via node --check"

      - name: BLOCKER hook test coverage(每個含 exit2/deny 的 hook 必有 test_<name>.sh — 2026-05-30 per laziness-hunt)
        run: node scripts/audit-hook-test-coverage.mjs --check 2>&1 | tail -20

      - name: Figma Make artifacts(SSOT propagation check)
        run: node scripts/gen-figma-make-artifacts.mjs --check

      - name: File-size budget enforcement
        run: |
          fail=0
          claude_lines=$(wc -l < CLAUDE.md | tr -d ' ')
          if [ "$claude_lines" -gt 800 ]; then
            echo "❌ CLAUDE.md ${claude_lines} lines exceeds 800 transition cap"
            fail=1
          fi
          for f in packages/design-system/src/components/*/*.spec.md; do
            l=$(wc -l < "$f" | tr -d ' ')
            case "$f" in
              */item-anatomy.spec.md) cap=1200 ;;
              */color.spec.md|*/sidebar.spec.md|*/tree-view.spec.md|*/field.spec.md|*/field-controls.spec.md|*/button.spec.md|*/overlay-surface.spec.md|*/action-bar.spec.md|*/uiSize.spec.md|*/data-table.spec.md) cap=800 ;;
              *) cap=500 ;;
            esac
            if [ "$l" -gt "$cap" ]; then
              echo "❌ $f ${l}/${cap} cap exceeded"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "✅ all files under cap"

  deploy-storybook:
    # Storybook → GitHub Pages(`https://ajenchen.github.io/design-system/`)
    # 只 push main 才 deploy(PR 不動 production Pages)
    name: Deploy Storybook to GitHub Pages
    # 2026-06-08 fix:依賴「Pages artifact 已 build」(needs.verify.outputs.pages_ready)而非「整個 Verify 綠」。
    # always() → Verify 因「非關鍵 doc-check」失敗時 deploy 仍跑;但 build 早期失敗(無 artifact)時
    # pages_ready 為空 → deploy 乾淨 skip(絕不部署 build 壞掉的)。根治「死連結卡住 storybook 永不更新」。
    if: ${{ always() && needs.verify.outputs.pages_ready == 'true' }}
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
