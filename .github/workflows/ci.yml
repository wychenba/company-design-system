name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 允許手動 trigger,讓 working branch 也能在 merge 前跑 verify + scrollbar probe
  workflow_dispatch:

# GitHub Pages 部署所需 permission(只 main push 才用,PR 不影響)
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只允許 1 個 Pages deploy(避免 race)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    name: Verify(tsc + tests + compile + build)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Match local dev container (node 22). Node 20 had compile-stories
          # exit 1 mismatch vs local pass — likely vm.runInNewContext / yaml
          # lib parse difference. Pin to 22 to align.
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: tsc -b(0 errors required)
        run: |
          if npx tsc -b 2>&1 | grep -q "error TS"; then
            echo "❌ tsc errors found"
            exit 1
          fi

      - name: Hook test suite
        run: |
          shopt -s nullglob
          fail=0
          for t in .claude/hooks/tests/test_*.sh; do
            chmod +x "$t"
            if ! bash "$t" > /tmp/test.log 2>&1; then
              echo "❌ $t failed:"
              tail -10 /tmp/test.log
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "✅ all hook tests passed"

      - name: Story compile-drift check
        run: |
          # 直接用 compile-stories.mjs 的 exit code:script 內部 `--check` mode 已正確
          # 區分 drift(exit 1)vs aligned-only(exit 0)。skipped count 不算 drift。
          # 印完整 output 方便 CI log 查問題,exit code 作為唯一 source of truth。
          set +e
          node scripts/compile-stories.mjs --all --check
          ec=$?
          if [ "$ec" -ne 0 ]; then
            echo "❌ compile-stories exited with code $ec — drift detected"
            exit "$ec"
          fi
          echo "✅ compile-stories: no drift"

      - name: Storybook build
        run: npm run build-storybook 2>&1 | tail -20

      - name: Storybook story runtime smoke test(Phase 4.13 — 0 console error gate)
        # 2026-05-25 Phase 4.13 加 — 本 session 已踩 3 個 story runtime bug(Breadcrumb asChild
        # / DataTable JSX comment / Internal pattern visual)。`build-storybook` 過 = compile pass
        # ≠ runtime render pass。本 step Playwright 訪問每個 story id + assert 0 console error,
        # catch React.Children.only / undefined import / 等 runtime trap。
        # Fail = block main merge / 防 runtime regression ship。
        run: node scripts/storybook-smoke-test.mjs

      - name: Windows-like scrollbar probe(Linux Chromium ≈ Windows persistent bar)
        # 地端 macOS 是 OS-overlay scrollbar，看不到 Windows 17px persistent bar 的圓角溢出。
        # CI Linux Chromium 預設 persistent native scrollbar，視覺接近 Win Chrome → 用來驗證
        # data-table.css v15.13 interim CSS parity 是否有效。
        # 跑完 upload artifact 給 user 看 corner-zoom 圖。
        run: |
          set -e
          # 1) 起 static http server serving storybook-static/
          python3 -m http.server 8000 --directory storybook-static > /tmp/sb-static.log 2>&1 &
          SERVER_PID=$!
          sleep 3
          curl -sf http://localhost:8000/ > /dev/null && echo "✓ storybook-static served" || (echo "✗ static server failed"; cat /tmp/sb-static.log; exit 1)
          # 2) 跑 probe
          STORYBOOK_URL=http://localhost:8000 node scripts/probe-windows-scrollbar.mjs 2>&1 | tail -40
          # 3) 收 server
          kill $SERVER_PID 2>/dev/null || true
          ls -la tmp/scrollbar-probe/ 2>&1 | tail -20

      - name: Upload scrollbar probe artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrollbar-probe-linux
          path: tmp/scrollbar-probe/
          if-no-files-found: warn

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

      - name: Vite build
        run: npm run build 2>&1 | tail -10

      - name: Story quality DS-wide(Dim 40/41/42 anti-sample deterministic scan)
        run: npm run story-quality:check 2>&1 | tail -20

      - name: Figma Make artifacts(SSOT propagation check)
        run: node scripts/gen-figma-make-artifacts.mjs --check

      - name: File-size budget enforcement
        run: |
          fail=0
          claude_lines=$(wc -l < CLAUDE.md | tr -d ' ')
          if [ "$claude_lines" -gt 800 ]; then
            echo "❌ CLAUDE.md ${claude_lines} lines exceeds 800 transition cap"
            fail=1
          fi
          for f in packages/design-system/src/components/*/*.spec.md; do
            l=$(wc -l < "$f" | tr -d ' ')
            case "$f" in
              */item-anatomy.spec.md) cap=1200 ;;
              */color.spec.md|*/sidebar.spec.md|*/tree-view.spec.md|*/field.spec.md|*/field-controls.spec.md|*/button.spec.md|*/overlay-surface.spec.md|*/action-bar.spec.md|*/uiSize.spec.md|*/data-table.spec.md) cap=800 ;;
              *) cap=500 ;;
            esac
            if [ "$l" -gt "$cap" ]; then
              echo "❌ $f ${l}/${cap} cap exceeded"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
          echo "✅ all files under cap"

  deploy-storybook:
    # Storybook → GitHub Pages(`https://ajenchen.github.io/design-system/`)
    # 只 push main 才 deploy(PR 不動 production Pages)
    name: Deploy Storybook to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
