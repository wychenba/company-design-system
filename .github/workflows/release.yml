# 2026-05-22 Phase 4 team-distribution-roadmap:GitHub Actions release pipeline
#
# Trigger:push tag `v*` → publish to npm + GitHub Release + plugin host
# Per roadmap acceptance:Mock `v0.1.0-beta.1` tag → CI 自動跑完 publish 到 internal registry
#
# 對齊 changesets/changesets GitHub repo + Vercel `pkg.pr.new` pre-release model
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      releaseType:
        description: 'Release type'
        required: false
        default: 'beta'
        type: choice
        options:
          - beta
          - next
          - stable
      action:
        description: 'Action to run(release = normal publish trigger via tag push;repoint-latest = point `latest` dist-tag to current `@beta` version so consumers without @beta suffix get usable build;clear-latest = unpoint latest entirely,strict semver pre-release hygiene before v1.0.0)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - repoint-latest
          - clear-latest

jobs:
  smoke-shard:
    name: Storybook FULL smoke shard ${{ matrix.shard }}/4
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'release')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false  # 一 shard fail 不擋其他 shard,看完整 fail picture
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Build DS lib + storybook-config dist(chained correct order)
        # 2026-05-26 fix:storybook-config 需 DS dist/ 先 build(preview.tsx import @qijenchen/design-system types)
        # `build:lib` script chain DS build → DS dts → storybook-config build,順序保證 type resolution OK
        run: npm run build:lib
      - name: Build Storybook
        run: npm run build-storybook
      - name: Run smoke shard ${{ matrix.shard }}/4(FULL 947 stories sharded)
        run: node scripts/storybook-smoke-test.mjs --full --shard=${{ matrix.shard }}/4

  release:
    name: Release packages
    needs: smoke-shard  # 4 shards 全綠才 release(per user「全盤驗證」directive)
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'release')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Audit gates(must PASS before publish)
        run: |
          npx tsc -b
          node scripts/audit-orphan-tokens.mjs --check
          node scripts/code-quality-audit.mjs --scope=packages/design-system/src/components
          node scripts/audit-content-quality.mjs --check
          node scripts/sync-governance-counters.mjs --check
          node scripts/gen-figma-make-artifacts.mjs --check
          node scripts/plugin-structure-validate.mjs

      - name: Build DS lib(produces packages/design-system/dist/ — required for npm publish)
        run: npm run build:lib

      - name: Build Storybook
        run: npm run build-storybook

      - name: Pack dry-run + verify dist/ included
        run: |
          cd packages/design-system
          npm pack --dry-run 2>&1 | tee /tmp/pack.log
          # 強制驗 dist/components/Button/index.js 在 pack 中 — 補位 beta.1-4 silently
          # 漏 dist/ 的 retro-fix(fix 2026-05-25)
          if ! grep -q "dist/components/Button" /tmp/pack.log; then
            echo "❌ dist/components/Button/ not in pack — lib build broken"
            exit 1
          fi
          if ! grep -q "dist/index.js" /tmp/pack.log; then
            echo "❌ dist/index.js not in pack"
            exit 1
          fi
          cd ../storybook-config
          npm pack --dry-run

      - name: Dogfood pre-publish verify(fresh consumer install + vite build)
        # 2026-05-25 Phase 4.11 加 — beta.1-10 連 ship 多次「裝完才發現少 transitive peer」
        # bug(lucide-react / react-is 等)。release audit gates 沒 catch,只有 Netlify
        # consumer build 才炸。此 script simulate fresh consumer install + vite build,
        # 提前 catch missing peer dep / 壞 exports 等 packaging bug。
        # Fail = block publish(per user verbatim「不要再耍白痴,確保自己驗證到成功」)。
        run: node scripts/dogfood-prepublish-verify.mjs

      # Storybook FULL smoke moved to parallel `smoke-shard` matrix job(2026-05-26)。
      # Per user 永久 directive「不要抽樣要全盤驗證」— 947-story full sweep 走 4-shard
      # GitHub matrix parallel(每 shard ~237 stories × ~3-5 min ≈ wall time 5-7 min),
      # `release` job gate on `needs: [smoke-shard]` block publish unless all 4 shards 全綠。
      # 對齊 Jest / Playwright / Vitest `--shard=N/M` canonical(industry standard)。

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Determine dist-tag from tag(v1.0.0 → latest;v1.0.0-beta.1 → beta;v1.0.0-next.1 → next)
          TAG_NAME="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG_NAME" == *"-beta"* ]]; then DIST_TAG=beta;
          elif [[ "$TAG_NAME" == *"-next"* ]]; then DIST_TAG=next;
          else DIST_TAG=latest; fi
          echo "Publishing with dist-tag: $DIST_TAG"

          cd packages/design-system
          npm publish --access public --tag $DIST_TAG
          cd ../storybook-config
          npm publish --access public --tag $DIST_TAG

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-next') }}

      # Claude plugin marketplace distribution(Phase 7 — 2026-05-23 ship per real Anthropic spec)
      # Distribution model:**GitHub-direct**(不走 Anthropic public marketplace)
      #   - Consumers add this repo as marketplace:`/plugin marketplace add github:qijenchen/design-system`
      #   - Plugin install:`/plugin install design-system@qijenchen-ds`
      #   - Version pinning:tag v0.x.x → marketplace.json + plugin.json `version` field bumped manually pre-tag
      #     OR omit version → commit SHA used(per Anthropic plugin spec auto-versioning)
      # No CLI publish step needed for GitHub-direct — GitHub repo IS the marketplace.
      # Anthropic-marketplace submission(future):manual via claude.ai/settings/plugins/submit
      - name: Verify plugin manifest version sync(BLOCKER - 2026-05-25 Phase 4.12 upgrade)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Per user 2026-05-25「不要有偏移的情況,包括所有檔案包括所有 plugin 都是」
          # 升 warning → error:tag push 前 package.json / plugin.json / marketplace.json
          # 版本必對齊 = 防 npm 跟 plugin 永遠同步。
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          DS_VERSION=$(jq -r '.version' packages/design-system/package.json)
          SB_VERSION=$(jq -r '.version' packages/storybook-config/package.json)
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          MARKETPLACE_META_VERSION=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          MARKETPLACE_PLUGIN_VERSION=$(jq -r '.plugins[] | select(.name=="design-system") | .version // empty' .claude-plugin/marketplace.json)

          echo "Tag:                $TAG_VERSION"
          echo "design-system:      $DS_VERSION"
          echo "storybook-config:   $SB_VERSION"
          echo "plugin.json:        $PLUGIN_VERSION"
          echo "marketplace.meta:   $MARKETPLACE_META_VERSION"
          echo "marketplace.plugin: $MARKETPLACE_PLUGIN_VERSION"

          fail=0
          for label_ver in "design-system:$DS_VERSION" "storybook-config:$SB_VERSION" "plugin.json:$PLUGIN_VERSION" "marketplace.meta:$MARKETPLACE_META_VERSION" "marketplace.plugin:$MARKETPLACE_PLUGIN_VERSION"; do
            label="${label_ver%%:*}"
            ver="${label_ver##*:}"
            if [ "$ver" != "$TAG_VERSION" ]; then
              echo "::error::$label version($ver)≠ tag($TAG_VERSION)— version drift detected"
              fail=1
            fi
          done

          if [ "$fail" -eq 1 ]; then
            echo "::error::Pre-tag must sync ALL 5 versions: design-system + storybook-config + plugin.json + marketplace.metadata + marketplace.plugins[design-system]"
            echo "::error::Re-run: scripts/bump-version.mjs(future)or manual sed all 5 files before tag push."
            exit 1
          fi
          echo "✓ all versions in sync with tag $TAG_VERSION"

  notify-consumers:
    # 2026-05-25 Phase 4.13 — Cross-repo immediate SSOT sync(per user 永久 directive
    # 「任何 ds repo 增刪改,package 該同步的都應該自動自主同步,不需要耳提面命」)
    # DS publish 成功後立即 dispatch `design-system-published` event 給 product-workspace,
    # product-workspace 自己的 sync-design-system.yml workflow 接收 event → 自動 npm update + commit + push
    # → Netlify auto-rebuild。免 Dependabot 24h daily 延遲,真即時同步。
    #
    # Pre-req:user 需 GitHub Settings → Secrets → Actions 加 `CROSS_REPO_TOKEN` PAT
    #   (https://github.com/settings/tokens → Fine-grained,scope: repo:write to ajenchen/product-workspace)
    # 沒設此 secret 此 job 會 skip(if guard)+ Dependabot daily 仍 fallback。
    name: Notify product-workspace(immediate sync)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Skip if CROSS_REPO_TOKEN not set
        id: check
        env:
          TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::CROSS_REPO_TOKEN secret not set — skip immediate sync(Dependabot daily fallback still works)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Dispatch design-system-published event to product-workspace
        if: steps.check.outputs.skip == 'false'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository: ajenchen/product-workspace
          event-type: design-system-published
          client-payload: |
            {
              "version": "${{ github.ref_name }}",
              "tag": "${{ github.ref }}",
              "commit": "${{ github.sha }}"
            }

  repoint-latest-tag:
    name: Repoint latest dist-tag → current @beta
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'repoint-latest'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Repoint latest → current @beta for both packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Why:beta.1 第一次 publish 時 npm 自動把 `latest` = beta.1,之後 `--tag beta` 只
          # 更新 beta 不動 latest。consumer 跑 `npm install @qijenchen/design-system`(無
          # @beta 後綴)會拉到 stale beta.X(可能 missing dist/ 等問題)。
          # 此 action auto-detect 兩 package 當前 @beta 版本,把 `latest` 重指過去 — Figma
          # Make / 任何 consumer 沒加 suffix 也能拉到最新可用 build。
          # Sustainable design: 每次 beta release 後 user 從 GitHub Actions UI run 一次即可
          #   (不在 tag-push job 自動跑,避免「latest = pre-release」semver 違紀)。
          #   未來 v1.0.0 stable release tag(無 -beta suffix)會自動把 latest = stable,
          #   屆時此 action 可 retire 或改為 emergency tool.
          for pkg in "@qijenchen/design-system" "@qijenchen/storybook-config"; do
            beta_ver=$(npm view "$pkg" dist-tags.beta 2>/dev/null)
            if [ -z "$beta_ver" ] || [ "$beta_ver" = "undefined" ]; then
              echo "::warning::$pkg has no @beta tag,skipping"
              continue
            fi
            echo "==> $pkg: repointing latest → $beta_ver"
            npm dist-tag add "$pkg@$beta_ver" latest
          done
          echo "---after repoint---"
          npm view @qijenchen/design-system dist-tags
          npm view @qijenchen/storybook-config dist-tags

  clear-latest-tag:
    name: Clear latest dist-tag(strict semver pre-release hygiene)
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'clear-latest'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - name: Remove latest tag from both packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Strict semver pre-release canonical: `latest` 不該存在 until v1.0.0 stable。
          # 此 action 把 latest 完全 unpoint → consumer `npm install <pkg>`(無 @beta)會
          # 失敗 with 明確 ERESOLVE error,強制 consumer 寫 `@beta`。
          npm dist-tag rm @qijenchen/design-system latest || echo "(已無 latest)"
          npm dist-tag rm @qijenchen/storybook-config latest || echo "(已無 latest)"
          echo "---after cleanup---"
          npm view @qijenchen/design-system dist-tags
          npm view @qijenchen/storybook-config dist-tags
